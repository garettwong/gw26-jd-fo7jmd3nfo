<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive"><meta name="referrer" content="no-referrer"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"><meta name="theme-color" content="#0f7074"><link rel="icon" href="../favicon-32.png"><title>Private salary versions</title>
<style>
:root{--ink:#1d2734;--muted:#667387;--line:#d7dee8;--paper:#fff;--bg:#eef1f6;--teal:#0f7074;--orange:#f2a33a;--red:#b42318}*{box-sizing:border-box}html{background:var(--bg);color:var(--ink);font:15px/1.4 "Segoe UI",Arial,sans-serif;letter-spacing:0}body{margin:0;min-height:100vh}header{background:#fff;border-top:6px solid var(--teal);border-bottom:1px solid var(--line)}.bar,main{max-width:980px;margin:auto;padding-left:20px;padding-right:20px}.bar{padding-top:18px;padding-bottom:18px;display:flex;align-items:center;gap:14px}.mark{width:48px;height:48px;border-radius:8px;background:var(--teal);display:grid;place-items:center;color:#fff;font-size:22px;font-weight:900;box-shadow:inset 0 9px 0 var(--orange)}.copy{flex:1;min-width:0}h1{font-size:23px;line-height:1.15;margin:0}.sub{color:var(--muted);margin:4px 0 0}.nav{display:flex;gap:7px}.nav a,.nav button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:8px 12px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);font:inherit;font-weight:800;text-decoration:none;white-space:nowrap}.nav a:hover,.nav button:hover,.nav a:focus-visible,.nav button:focus-visible{background:#e9f5f4;outline:0}main{padding-top:24px;padding-bottom:48px}h2{font-size:13px;text-transform:uppercase;color:var(--muted);margin:0 0 10px}.versions{border:1px solid var(--line);background:var(--paper);border-radius:8px;overflow:hidden}.version{width:100%;min-height:78px;padding:14px 16px;display:flex;align-items:center;gap:14px;border:0;border-bottom:1px solid var(--line);background:#fff;color:inherit;text-align:left;font:inherit;cursor:pointer}.version:last-child{border-bottom:0}.version:hover,.version:focus-visible{background:#f5faf9;outline:0}.version-main{display:flex;align-items:center;gap:9px;flex:1;min-width:0;flex-wrap:wrap}.version strong{font-size:17px}.version small{flex-basis:100%;color:var(--muted);font-size:13px}.latest{background:var(--teal);color:#fff;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800}.open{font-size:28px;color:var(--teal)}.locked{max-width:520px;margin:15vh auto;background:#fff;border:1px solid var(--line);border-top:6px solid var(--red);padding:24px;border-radius:8px}.locked h1{font-size:23px}.locked p{color:var(--muted)}.hidden{display:none}@media(max-width:620px){.bar{padding:14px 12px;align-items:flex-start;flex-wrap:wrap}.mark{width:42px;height:42px}.copy{width:calc(100% - 58px)}h1{font-size:20px}.nav{width:100%;display:grid;grid-template-columns:1fr 1fr}.nav a,.nav button{width:100%}main{padding:18px 12px 36px}.version{padding:13px 12px}.version strong{font-size:16px}}
</style></head><body><div id="locked" class="locked"><h1>Private salary link required</h1><p>Open the complete private salary URL once on this device. The shareable timetable never contains your access key.</p></div><div id="app" class="hidden"><header><div class="bar"><div class="mark" aria-hidden="true">&#36;</div><div class="copy"><h1>Garett's Salary</h1><p class="sub">Select a saved timetable version.</p></div><div class="nav"><a href="../master/?v=redtext1">Timetable</a><button id="lock" type="button">Lock</button></div></div></header><main><h2>Salary Versions</h2><div class="versions"><button class="version" type="button" data-version="2026-07-15-V07a"><span class="version-main"><strong>2026-07-15 - V07a</strong><span class="latest">Latest</span><small>Added two weekday 09:00-12:00 proposed HK239HG CW10 replacement slots on 24 and 26 August. Both are followed by a confirmed 14:00 class at the same Choi Wan centre; no Saturday is proposed.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-15-V07"><span class="version-main"><strong>2026-07-15 - V07</strong><small>Redone priority check: accepted HK239HG CW10 L1, L3, L5 and L6; retained confirmed SEN conflicts; released three dotted HK281DS holds after same-centre travel checks. Delta markers show V07 changes only, with corrected iPhone landscape sizing.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-15-V06"><span class="version-main"><strong>2026-07-15 - V06</strong><small>Added a version-selector shortcut and arranged the six floating controls in a 3 by 2 grid; schedule data unchanged from V05c.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V05c"><span class="version-main"><strong>2026-07-14 - V05c</strong><small>Comparison view: 52 cards changed since V04 are highlighted, filterable, and show their previous content; schedule data unchanged from V05b.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V05b"><span class="version-main"><strong>2026-07-14 - V05b</strong><small>Online travel audit: flagged five Sheung Shui to Four Seas transfers and the Oct 7 Four Seas to Choi Wan transfer as tight; lesson data unchanged.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V05a"><span class="version-main"><strong>2026-07-14 - V05a</strong><small>Content-ledger audit: corrected all six confirmed HK239HG SS lessons to 08:30-12:30.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V05"><span class="version-main"><strong>2026-07-14 - V05</strong><small>Full source audit: corrected lesson codes, times and numbering; completed FS-1 context.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V04"><span class="version-main"><strong>2026-07-14 - V04</strong><small>Added a floating back-to-filters button; schedule data unchanged.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V03"><span class="version-main"><strong>2026-07-14 - V03</strong><small>Instructor name corrected to Calvin; confirmed HK244EG Class CW retained.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V02"><span class="version-main"><strong>2026-07-14 - V02</strong><small>HK244EG Class CW marked confirmed.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-13-V01"><span class="version-main"><strong>2026-07-13 - V01</strong><small>Calvin&#x27;s HK244EG Class CW schedule added for checking.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button></div></main></div>
<script>
const STORAGE_KEY='garetts-erb-earnings-key-v1';
const dec=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0))};
function candidate(){const hash=location.hash.slice(1);const fromHash=hash.replace(/^key=/,'');return fromHash||localStorage.getItem(STORAGE_KEY)||''}
async function decrypt(path,raw){const key=await crypto.subtle.importKey('raw',dec(raw),'AES-GCM',false,['decrypt']);const enc=await fetch(path,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Missing encrypted report');return r.json()});const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(enc.nonce),additionalData:new TextEncoder().encode('erb-earnings-v1')},key,dec(enc.ciphertext));return JSON.parse(new TextDecoder().decode(plain))}
async function start(){const raw=candidate();if(!raw)return;try{await decrypt('versions/2026-07-15-V07a/earnings.enc.json',raw);localStorage.setItem(STORAGE_KEY,raw);document.getElementById('locked').remove();document.getElementById('app').classList.remove('hidden');document.querySelectorAll('[data-version]').forEach(button=>button.addEventListener('click',()=>location.assign('versions/'+button.dataset.version+'/#key='+raw)));document.getElementById('lock').addEventListener('click',()=>{localStorage.removeItem(STORAGE_KEY);history.replaceState(null,'',location.pathname);location.reload()})}catch(error){document.querySelector('#locked p').textContent='This private link is invalid or the encrypted salary data could not be opened.'}}
start();window.addEventListener('hashchange',start);
</script></body></html>
