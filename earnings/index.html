ns.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-18-V18c"><span class="version-main"><strong>2026-07-18 - V18c</strong><small>Web - daily spans and status sections; MC0106DS Room 306 lessons recorded as Calvin.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-17-V18b"><span class="version-main"><strong>2026-07-17 - V18b</strong><small>Calendar - daily teaching hours added for ME CONF and ME ALL; travel excluded.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-17-V18a"><span class="version-main"><strong>2026-07-17 - V18a</strong><small>HK280HS SS - five availability dates added; exact lessons and times pending Calvin.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-17-V18"><span class="version-main"><strong>2026-07-17 - V18</strong><small>HK281DS CW7 - Garett does not join; HK280HS SS Sep 14 AM remains proposed.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-17-V17D"><span class="version-main"><strong>2026-07-17 - V17D</strong><small>Web - MC0106DS legend and course-filter reset.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-17-V17C"><span class="version-main"><strong>2026-07-17 - V17C</strong><small>MC0106DS 第2班 - six Garett lessons confirmed; upcoming-course summary added.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-17-V17A"><span class="version-main"><strong>2026-07-17 - V17A</strong><small>HK239HG FS - Aug 14 and 19 confirmed; clean accepted schedule 0"><span class="version-main"><strong>2026-07-16 - V10</strong><small>Class spans - first timeline view.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-16-V09"><span class="version-main"><strong>2026-07-16 - V09</strong><small>Web - tap a course code to filter that class.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-16-V08"><span class="version-main"><strong>2026-07-16 - V08</strong><small>HK239HG CW10 - six lessons confirmed.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-16-V07b"><span class="version-main"><strong>2026-07-16 - V07b</strong><small>HK239HG CW10 - eight morning options.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-15-V07a"><span class="version-main"><strong>2026-07-15 - V07a</strong><small>HK239HG CW10 - Aug 24 and 26 options.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-15-V07"><span class="version-main"><strong>2026-07-15 - V07</strong><small>HK239HG CW10 - first checked proposal.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-15-V06"><span class="version-main"><strong>2026-07-15 - V06</strong><small>Web - version button and 3x2 controls.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V05c"><span class="version-main"><strong>2026-07-14 - V05c</strong><small>Audit - V04 changes highlighted.</small></span><span class="open" aria-hidden="true">&rsaquo;</span></button><button class="version" type="button" data-version="2026-07-14-V0 <script>
const STORAGE_KEY='garetts-erb-earnings-key-v1';
const dec=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0))};
function candidate(){const hash=location.hash.slice(1);const fromHash=hash.replace(/^key=/,'');return fromHash||localStorage.getItem(STORAGE_KEY)||''}
async function decrypt(path,raw){const key=await crypto.subtle.importKey('raw',dec(raw),'AES-GCM',false,['decrypt']);const enc=await fetch(path,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Missing encrypted report');return r.json()});const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(enc.nonce),additionalData:new TextEncoder().encode('erb-earnings-v1')},key,dec(enc.ciphertext));return JSON.parse(new TextDecoder().decode(plain))}
async function start(){const raw=candidate();if(!raw){location.replace('../master/?v=redtext1');return}try{await decrypt('versions/2026-07-19-V18i/earnings.enc.json',raw);localStorage.setItem(STORAGE_KEY,raw);document.getElementById('app').classList.remove('hidden');document.querySelectorAll('[data-version]').forEach(button=>button.addEventListener('click',()=>location.assign('versions/'+button.dataset.version+'/#key='+raw)))}catch(error){location.replace('../master/?v=redtext1')}}
start();window.addEventListener('hashchange',start);
</script></body></html>
